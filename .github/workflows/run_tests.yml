name: CI
on:
  pull_request:
    branches: [ main ]
defaults:
  run:
    working-directory: ./
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        node-version: [20.12.1]
    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci --legacy-peer-deps
      - run: npm run check
      - run: npm run build
