steps:
  # Build and tag for DEV
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '--build-arg', 'ENV=development',
        '-t', 'gcr.io/telepracticepro-dev/telepracticepro-frontend:latest',
        '.'
      ]

  # Push DEV image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/telepracticepro-dev/telepracticepro-frontend:latest']

  # Deploy to DEV Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run', 'deploy', 'telepracticepro-frontend',
        '--image=gcr.io/telepracticepro-dev/telepracticepro-frontend:latest',
        '--region=us-central1',
        '--platform=managed',
        '--allow-unauthenticated'
      ]

timeout: 1800s

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/telepracticepro-dev/telepracticepro-frontend:latest'